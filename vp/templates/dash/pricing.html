<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f6f8fb;
      font-family: "Segoe UI", sans-serif;
    }
    .navbar {
      background: #2f8f4f;
    }
    .nav-link {
      color: #fff !important;
    }
    .plan-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'dash_path' %}">Easy Laundry</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'dash_path' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'order_path' %}">Order</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'payment_path' %}">Payment</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'plan_path' %}">Pricing</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="text-center mb-4">
      <h3>Choose a plan</h3>
      <p class="text-muted">Simple pricing for casual and regular laundry users.</p>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="card plan-card p-3 text-center">
          <h5>Basic</h5>
          <h2 class="text-success">৳299</h2>
          <p class="text-muted">Great for weekly laundry.</p>
          <a href="{% url 'payment_path' %}" class="btn btn-outline-success">Buy</a>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card plan-card p-3 text-center border-success">
          <h5>Family</h5>
          <h2 class="text-success">৳599</h2>
          <p class="text-muted">Best for shared household orders.</p>
          <a href="{% url 'payment_path' %}" class="btn btn-success">Buy</a>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card plan-card p-3 text-center">
          <h5>Premium</h5>
          <h2 class="text-success">৳999</h2>
          <p class="text-muted">Fast service and priority pickup.</p>
          <a href="{% url 'payment_path' %}" class="btn btn-outline-success">Buy</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
