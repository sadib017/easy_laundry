<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f6f8fb;
      font-family: "Segoe UI", sans-serif;
    }
    .navbar {
      background: #2f8f4f;
    }
    .nav-link {
      color: #fff !important;
    }
    .hero-card {
      background: linear-gradient(135deg, #2f8f4f, #4fcf7f);
      color: white;
      border: none;
    }
    .stat-card {
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'dash_path' %}">Easy Laundry</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'dash_path' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'order_path' %}">Order</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'payment_path' %}">Payment</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'plan_path' %}">Pricing</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card hero-card p-4 mb-4">
      <h2 class="mb-2">Welcome back!</h2>
      <p class="mb-3">Book, track, and pay for your laundry in a few clicks.</p>
      <a href="{% url 'order_path' %}" class="btn btn-light text-success">Start New Order</a>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="card stat-card p-3">
          <h6 class="text-muted">Active Orders</h6>
          <h3 class="mb-0">2</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card p-3">
          <h6 class="text-muted">Ready for Pickup</h6>
          <h3 class="mb-0">1</h3>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card stat-card p-3">
          <h6 class="text-muted">Total Paid</h6>
          <h3 class="mb-0">৳540</h3>
        </div>
      </div>
    </div>

    <div class="card p-3">
      <h5 class="mb-3">Recent Activity</h5>
      <ul class="list-group list-group-flush">
        <li class="list-group-item d-flex justify-content-between">
          <span>Normal Wash</span>
          <span class="text-muted">Picked up</span>
        </li>
        <li class="list-group-item d-flex justify-content-between">
          <span>Dry Clean</span>
          <span class="text-muted">In process</span>
        </li>
        <li class="list-group-item d-flex justify-content-between">
          <span>Ironing</span>
          <span class="text-muted">Ready</span>
        </li>
      </ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
