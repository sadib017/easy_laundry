<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f6f8fb;
      font-family: "Segoe UI", sans-serif;
    }
    .navbar {
      background: #2f8f4f;
    }
    .nav-link {
      color: #fff !important;
    }
    .payment-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'dash_path' %}">Easy Laundry</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'dash_path' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'order_path' %}">Order</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'payment_path' %}">Payment</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'plan_path' %}">Pricing</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card payment-card p-4">
      <h3 class="mb-3">Payment</h3>
      <p class="text-muted">Choose your preferred payment option and complete the checkout.</p>

      <div class="mb-3">
        <label for="paymentMethod" class="form-label">Method</label>
        <select id="paymentMethod" class="form-select" onchange="toggleDetails()">
          <option value="cash">Cash on delivery</option>
          <option value="bkash">Bkash</option>
        </select>
      </div>

      <div id="bkashBox" class="mb-3" style="display:none;">
        <label for="txnId" class="form-label">Bkash transaction ID</label>
        <input id="txnId" class="form-control" placeholder="Enter transaction ID">
      </div>

      <div class="alert alert-success" id="summaryBox" role="alert">
        Total: <strong>৳180</strong>
      </div>

      <button class="btn btn-success" onclick="submitPayment()">Pay Now</button>
    </div>
  </div>

  <script>
    function toggleDetails() {
      const method = document.getElementById('paymentMethod').value;
      const bkashBox = document.getElementById('bkashBox');
      bkashBox.style.display = method === 'bkash' ? 'block' : 'none';
    }

    function submitPayment() {
      const method = document.getElementById('paymentMethod').value;
      const txnId = document.getElementById('txnId').value;
      if (method === 'bkash' && !txnId) {
        alert('Please enter your Bkash transaction ID.');
        return;
      }
      alert('Payment submitted successfully.');
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
