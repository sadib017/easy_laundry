<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantity</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f6f8fb;
      font-family: "Segoe UI", sans-serif;
    }
    .navbar {
      background: #2f8f4f;
    }
    .nav-link {
      color: #fff !important;
    }
    .quantity-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'dash_path' %}">Easy Laundry</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'dash_path' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'order_path' %}">Order</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'payment_path' %}">Payment</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'plan_path' %}">Pricing</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card quantity-card p-4">
      <h3 class="mb-3">Select Items</h3>
      <form method="post" action="{% url 'quantity_path' %}">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Item 1</label>
            <select class="form-select" name="wash_type1">
              <option>Shirt</option>
              <option>Pant</option>
              <option>Towel</option>
              <option>Bedsheet</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" name="quantity1" value="1" min="1">
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-md-6">
            <label class="form-label">Item 2</label>
            <select class="form-select" name="wash_type2">
              <option>Shirt</option>
              <option>Pant</option>
              <option>Towel</option>
              <option>Bedsheet</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" name="quantity2" value="1" min="1">
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-success">Calculate Price</button>
          <a href="{% url 'payment_path' %}" class="btn btn-outline-success">Go to payment</a>
        </div>
      </form>

      <div class="alert alert-light border mt-4">
        <strong>Total estimate:</strong> {{ total_price|default:"0" }} tk
      </div>
      {% if error %}
        <div class="text-danger">{{ error }}</div>
      {% endif %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
